name: Release

on:
  push:
    tags:
      - "v*"

# Allow the action to create the GitHub release and upload assets.
permissions:
  contents: write

jobs:
  release:
    name: Build, sign & notarize (Apple Silicon)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      - name: Build, sign & notarize
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Developer ID signing + notarization ---
          # If these secrets are unset, tauri-action builds an UNSIGNED .dmg
          # (still uploaded). Set them to ship a clean, notarized download:
          #   APPLE_CERTIFICATE          base64 of a "Developer ID Application" .p12
          #   APPLE_CERTIFICATE_PASSWORD password for that .p12
          #   APPLE_SIGNING_IDENTITY     e.g. "Developer ID Application: Your Name (TXN399AHT5)"
          #   APPLE_ID / APPLE_PASSWORD  Apple ID + an app-specific password (notarization)
          #   APPLE_TEAM_ID              TXN399AHT5
          #   KEYCHAIN_PASSWORD          any string (temp keychain on the runner)
          # See docs/RELEASING.md.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # The Developer ID build uses a non-sandboxed-profile entitlements set
          # (no com.apple.application-identifier, which is App-Store-only) and
          # emits both the .app and the .dmg.
          args: --target aarch64-apple-darwin --bundles app,dmg --config src-tauri/tauri.conf.devid.json
          tagName: ${{ github.ref_name }}
          releaseName: "Memosa ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          prerelease: false

      # The README badge and the memosa website point at the version-independent
      # releases/latest/download/Memosa-mac-arm64.dmg, so every release must also
      # carry the DMG under that stable name.
      - name: Upload stable-name DMG alias
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dmg=$(ls target/aarch64-apple-darwin/release/bundle/dmg/Memosa_*_aarch64.dmg)
          cp "$dmg" Memosa-mac-arm64.dmg
          gh release upload "${{ github.ref_name }}" Memosa-mac-arm64.dmg --clobber
